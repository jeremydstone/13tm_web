<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>13 Til Midnight — Pics</title>
  <meta name="description" content="Photo gallery — 13 Til Midnight live and on the road." />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header is-fixed" data-sticky>
    <div class="container">
      <div class="nav-left">
        <button type="button" class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        <nav class="nav" aria-label="Primary">
          <a href="index.html">Shows</a>
          <a href="pics.html" aria-current="page">Pics</a>
          <a href="videos.html">Videos</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
      <div class="socials">
        <a href="https://facebook.com/13tilmidnight" target="_blank" rel="noopener" aria-label="Facebook">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 12.06C22 6.5 17.52 2 12 2S2 6.5 2 12.06c0 5 3.66 9.15 8.44 9.94v-7.03H7.9v-2.9h2.54V9.85c0-2.5 1.49-3.89 3.78-3.89 1.09 0 2.24.2 2.24.2v2.46h-1.26c-1.24 0-1.63.78-1.63 1.57v1.88h2.78l-.44 2.9h-2.34V22c4.78-.79 8.43-4.94 8.43-9.94Z"/></svg>
        </a>
        <a href="https://instagram.com/13tilmidnight" target="_blank" rel="noopener" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="2.5" width="19" height="19" rx="5.5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.4" cy="6.6" r="1.1" fill="currentColor" stroke="none"/></svg>
        </a>
      </div>
    </div>
  </header>

  <section class="page-hero">
    <div class="container">
      <p class="page-hero__eyebrow" data-reveal>Gallery</p>
      <h1 data-reveal style="--reveal-delay:80ms">Pics</h1>
      <p data-reveal style="--reveal-delay:160ms">On stage, on the road, and everywhere in between. Tap any photo to view it full size.</p>
    </div>
  </section>

  <main>
    <section class="section section--tight">
      <div class="container">
        <div class="gallery" id="gallery"><!-- built by js/gallery.js --></div>
      </div>
    </section>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" aria-hidden="true" inert role="dialog" aria-label="Photo viewer">
    <button type="button" class="lightbox__btn lightbox__close" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
    <button type="button" class="lightbox__btn lightbox__prev" aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button type="button" class="lightbox__btn lightbox__next" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
    </button>
    <img class="lightbox__img" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" alt="" />
    <div class="lightbox__counter"></div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <span class="brand">13 TIL MIDNIGHT</span>
      <span class="muted">Pacific Northwest · Booking: <a href="contact.html">Contact</a></span>
      <span class="muted">&copy; <span id="year"></span> 13 Til Midnight</span>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/gallery.js"></script>
  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
